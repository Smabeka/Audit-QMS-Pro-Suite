<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AQMS Pro Suite</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="AQMS Pro Suite">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c2b4a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f5ee; --paper:#ffffff; --line:#e2dbc9; --line2:#eee7d5; --ink:#2a2620;
    --muted:#8a8168; --navy:#1c2b4a; --navyBg:#e4e9f2; --rust:#9b3f28; --rustBg:#f6e4dd;
    --green:#3f6b2e; --greenBg:#e6ede0; --amber:#8a5a10; --amberBg:#faedd4;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Public Sans',sans-serif;}
  h1,h2,h3,.serif{font-family:'Fraunces',serif;}
  .wrap{max-width:900px;margin:0 auto;padding:0 20px;}
  header{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(247,245,238,.95);backdrop-filter:blur(6px);z-index:10;}
  .headrow{display:flex;align-items:center;justify-content:space-between;padding:16px 0;}
  .brand{display:flex;align-items:center;gap:10px;}
  .logo{width:44px;height:44px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;letter-spacing:.02em;flex-shrink:0;}
  .brand h1{font-size:21px;font-weight:600;margin:0;color:var(--navy);}
  .brand p{font-size:11px;color:var(--muted);margin:2px 0 0;text-transform:uppercase;letter-spacing:.12em;}
  nav{display:flex;gap:4px;}
  nav button{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit;}
  nav button.active{color:var(--rust);border-color:var(--rust);}
  main{padding:24px 0 60px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 2px rgba(30,25,15,.04);}
  .p4{padding:16px;}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  @media(min-width:700px){.stats{grid-template-columns:repeat(4,1fr);}}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;}
  .stat-value{font-size:24px;font-family:'Fraunces',serif;color:var(--navy);}
  input,select{background:#fff;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:14px;color:var(--ink);font-family:inherit;width:100%;}
  input:focus,select:focus{outline:none;border-color:var(--rust);box-shadow:0 0 0 3px rgba(155,63,40,.12);}
  label.field{display:flex;flex-direction:column;gap:4px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;font-size:14px;cursor:pointer;border:none;font-family:inherit;}
  .btn-primary{background:var(--navy);color:#fff;font-weight:500;}
  .btn-primary:hover{background:#16223b;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:#4a4535;}
  .btn-ghost:hover{background:#efe9dc;}
  .btn-danger{background:transparent;border:1px solid #e8c3b5;color:var(--rust);}
  .btn-danger:hover{background:var(--rustBg);}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;border:1px solid;font-size:11px;font-weight:500;}
  .tag-neutral{background:#efe9dc;color:#5c5540;border-color:#ddd4bc;}
  .tag-rust{background:var(--rustBg);color:var(--rust);border-color:#e8c3b5;}
  .tag-green{background:var(--greenBg);color:var(--green);border-color:#c7dab8;}
  .tag-navy{background:var(--navyBg);color:var(--navy);border-color:#c3cee2;}
  .tag-amber{background:var(--amberBg);color:var(--amber);border-color:#efd6a0;}
  .grid2{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:640px){.grid2{grid-template-columns:1fr 1fr;}}
  .grid3{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:640px){.grid3{grid-template-columns:1fr 1fr 1fr;}}
  .audit-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:none;border:none;cursor:pointer;text-align:left;font-family:inherit;}
  .audit-row:hover{background:#faf8f2;}
  .audit-title{font-size:14px;font-weight:500;color:var(--ink);}
  .audit-sub{font-size:11px;color:#a39a86;}
  .section-box{border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:10px;}
  .item-row{display:flex;align-items:flex-start;gap:8px;padding:4px 0;}
  .result-toggle{display:flex;gap:2px;flex-shrink:0;}
  .result-toggle button{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;font-size:16px;line-height:1;}
  .result-toggle button.active{background:#efe9dc;}
  .finding-box{border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:10px;}
  .muted-italic{color:#a39a86;font-style:italic;font-size:13px;}
  .flex-wrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .status-pill{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:none;cursor:pointer;font-family:inherit;}
  .status-pill.active{border-color:rgba(155,63,40,.5);color:var(--rust);background:var(--rustBg);}
  .top-border{border-top:1px solid var(--line2);padding-top:12px;margin-top:12px;}
  .x-btn{background:none;border:none;color:#c9c0a8;cursor:pointer;padding:2px;}
  .x-btn:hover{color:var(--rust);}
  .saved-flash{font-size:10px;color:var(--green);}
  .center{display:flex;align-items:center;justify-content:center;min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------- storage ---------- */
const STORE_KEY = "audit-qms-standalone-v1";
function loadStore(){ try{ const r = localStorage.getItem(STORE_KEY); return r? JSON.parse(r): null; }catch(e){ return null; } }
function saveStore(d){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(d)); }catch(e){ console.error(e); } }

const uid = () => Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const daysUntil = (d) => Math.ceil((new Date(d) - new Date(today())) / 86400000);

const STANDARDS = [
  "ISO 9001:2015","ISO 22000","FSSC 22000","BRCGS","HACCP","Internal GMP",
  "Pharma GMP","ISO 45001 (Steel/Mining OHS)","ISO 14001 (Petroleum/Environmental)",
  "ISO 50001 (Energy)","WIPHA (Wine)","TPN (Tobacco)","Cosmetics GMP",
  "SMETA/AQL (Clothing)","ISO/ESD (Tech)","IOSA (Airlines)","ISM Code (Maritime)",
  "Minerals Processing"
];
const TEMPLATES = {
  "ISO 9001:2015":[
    {name:"Document Control", items:["Controlled documents current, no obsolete versions in use","Document approval and revision history maintained","Records retained per defined retention schedule"]},
    {name:"Management Review & Internal Audit", items:["Management review inputs/outputs documented","Internal audit programme up to date and scheduled","Prior audit findings closed out with evidence"]},
    {name:"Nonconformity & Corrective Action", items:["Nonconformities logged with root cause analysis","Corrective actions verified for effectiveness"]}
  ],
  "ISO 22000":[
    {name:"Food Safety Management System", items:["Food safety policy communicated and understood","Hazard analysis reviewed and current","PRPs (prerequisite programmes) implemented and verified"]},
    {name:"Operational Controls", items:["CCP/OPRP monitoring records complete","Emergency preparedness and recall procedure tested"]}
  ],
  "FSSC 22000":[
    {name:"Food Defense & Fraud", items:["Food defense (TACCP) plan current and site-assessed","Food fraud (VACCP) vulnerability assessment on file"]},
    {name:"PRP Verification", items:["Pest control programme records up to date","Allergen management controls verified","Glass and hard plastic register current"]}
  ],
  "HACCP":[
    {name:"CCP Monitoring", items:["Critical limits defined and monitored for each CCP","Monitoring records complete for the review period","Deviation and corrective action log up to date"]},
    {name:"HACCP Plan Maintenance", items:["HACCP plan reviewed annually or after process change","Verification/validation activities documented"]}
  ],
  "Internal GMP":[
    {name:"Personnel Hygiene", items:["Hand-washing and sanitising practices observed","Protective clothing worn and changed as required"]},
    {name:"Premises & Equipment", items:["Cleaning schedules completed and signed off","Equipment calibration records current","Pest control stations checked and logged"]}
  ],
  "Pharma GMP":[
    {name:"Batch Records & Documentation", items:["Batch manufacturing records complete and signed","Deviations documented with impact assessment","Line clearance verified before batch start"]},
    {name:"Cleanroom & Environmental Monitoring", items:["Environmental monitoring within alert/action limits","Gowning procedure followed correctly","Equipment cleaning validation current"]}
  ],
  "ISO 45001 (Steel/Mining OHS)":[
    {name:"Hazard Identification & Risk", items:["Risk assessments current for high-risk tasks","PPE availability and correct usage confirmed","Permit-to-work system followed for hot/confined work"]},
    {name:"Incident Management", items:["Incidents and near-misses logged and investigated","Emergency response drills conducted per schedule"]}
  ],
  "ISO 14001 (Petroleum/Environmental)":[
    {name:"Environmental Controls", items:["Spill containment and secondary containment intact","Waste segregation and disposal records current","Emissions monitoring within permitted limits"]},
    {name:"Compliance & Emergency Preparedness", items:["Environmental legal register up to date","Spill/emergency response equipment accessible and tested"]}
  ],
  "ISO 50001 (Energy)":[
    {name:"Energy Performance", items:["Energy baseline and KPIs reviewed and current","Significant energy uses identified and monitored"]},
    {name:"Energy Management System", items:["Energy action plans tracked to completion","Metering/sub-metering data verified for accuracy"]}
  ],
  "WIPHA (Wine)":[
    {name:"Cellar & Production Hygiene", items:["Tank and equipment sanitation records complete","Additive and processing aid usage logged correctly"]},
    {name:"Traceability & Labelling", items:["Batch/vintage traceability from grape intake to bottling","Label claims (vintage, region, varietal) verified against records"]}
  ],
  "TPN (Tobacco)":[
    {name:"Product Quality Controls", items:["Moisture and physical parameter checks recorded","Foreign matter inspection records current"]},
    {name:"Traceability & Track-and-Trace", items:["Unique identifier/track-and-trace markings verified","Supply chain due diligence records on file"]}
  ],
  "Cosmetics GMP":[
    {name:"Formulation & Batch Control", items:["Batch records match approved formulation","Microbial and stability testing records current"]},
    {name:"Labelling & Claims", items:["INCI ingredient listing accurate on labels","Product claims substantiated and on file"]}
  ],
  "SMETA/AQL (Clothing)":[
    {name:"Labour & Ethical Standards", items:["Working hours and wage records reviewed","Health & safety conditions on the production floor observed"]},
    {name:"AQL Inspection", items:["Sample size and AQL level applied per inspection plan","Defects classified (critical/major/minor) and logged"]}
  ],
  "ISO/ESD (Tech)":[
    {name:"ESD Control Programme", items:["Wrist strap and grounding checks logged at workstations","ESD flooring/matting resistance tested per schedule"]},
    {name:"Product Quality", items:["Functional test records complete for finished units","Firmware/software version traceability maintained"]}
  ],
  "IOSA (Airlines)":[
    {name:"Flight Operations & Safety", items:["Crew training and currency records up to date","Safety management system (SMS) reports reviewed"]},
    {name:"Ground & Catering Operations", items:["Ground handling procedures followed per manual","Catering food safety and cold chain records verified"]}
  ],
  "ISM Code (Maritime)":[
    {name:"Safety Management System", items:["Shipboard SMS documentation current and accessible","Non-conformities from prior audit closed out"]},
    {name:"Crew & Emergency Preparedness", items:["Crew drills (fire, abandon ship, pollution) conducted per schedule","Certificates of competency current for all crew"]}
  ],
  "Minerals Processing":[
    {name:"Process Controls", items:["Process parameters within specification ranges","Sampling and assay records complete and traceable"]},
    {name:"Safety & Environmental", items:["Tailings/waste management controls verified","Dust and emissions monitoring records current"]}
  ]
};
const SEVERITIES = ["Minor","Major","Critical"];
const sevTone = {Minor:"amber",Major:"rust",Critical:"rust"};
const statusTone = {Open:"rust","In Progress":"amber",Closed:"green",Planned:"navy"};

function seedAudit(title, standard, area, sections){
  return {
    id: uid(), title, standard, area, auditor:"", date: today(), status:"Planned",
    sections: sections.map(s => ({ id: uid(), name: s.name, items: s.items.map(text => ({id:uid(), text, result:null, note:""})) })),
    findings: []
  };
}

function seedData(){
  const a = seedAudit("Q3 GMP Verification — Bakery Line 2","FSSC 22000","Production",[
    {name:"Personnel Hygiene", items:["Hairnets and beard snoods worn correctly","No jewellery or false nails observed","Hand-wash stations stocked and functional"]},
    {name:"CCP Monitoring", items:["Chiller temp logs complete and within range","Metal detector verification records up to date"]},
    {name:"Housekeeping", items:["Floors and drains clean, no standing water","Waste segregated and bins covered"]}
  ]);
  a.sections[1].items[1].result = "Fail";
  a.findings = [{
    id: uid(), clause:"CCP Monitoring", desc:"Metal detector verification log missing entries for two shifts",
    severity:"Major", owner:"Line Supervisor", dueDate:"2026-07-18",
    actionText:"Reissue verification log, retrain shift leads, daily QA spot-check for 2 weeks", status:"Open"
  }];
  return { audits: [a] };
}

let state = loadStore() || seedData();
let tab = "dashboard";
let jumpTo = null;
let showNewAudit = false;
let openAuditId = null;
let capaFilter = "All";
let savedFlashTimer = null;

function persist(){
  saveStore(state);
  const el = document.getElementById("saved-flash");
  if(el){ el.style.opacity = "1"; clearTimeout(savedFlashTimer); savedFlashTimer = setTimeout(()=>{ if(el) el.style.opacity="0"; }, 900); }
}

function esc(str){ const d=document.createElement("div"); d.textContent = str==null? "": str; return d.innerHTML; }

/* ---------- render ---------- */
function render(){
  const root = document.getElementById("app");
  root.innerHTML = `
    <header>
      <div class="wrap headrow">
        <div class="brand">
          <div class="logo">AQ</div>
          <div><h1>AuditQMS Pro Suite</h1><p>Food · Safety · Environment · Lab</p></div>
        </div>
        <span class="saved-flash" id="saved-flash" style="opacity:0;transition:opacity .3s;">● saved</span>
      </div>
      <div class="wrap" style="display:flex;gap:4px;">
        ${navBtn("dashboard","Dashboard")}
        ${navBtn("audits","Audit Register")}
        ${navBtn("capa","CAPA Tracker")}
      </div>
    </header>
    <main class="wrap">
      ${tab==="dashboard" ? renderDashboard() : tab==="audits" ? renderAudits() : renderCapa()}
    </main>
  `;
  attachHandlers();
}

function navBtn(key,label){
  return `<button data-nav="${key}" class="${tab===key?'active':''}">${label}</button>`;
}

function scoreOf(audit){
  const items = audit.sections.flatMap(s=>s.items).filter(i=>i.result==="Pass"||i.result==="Fail");
  if(items.length===0) return null;
  return Math.round((items.filter(i=>i.result==="Pass").length/items.length)*100);
}

function renderDashboard(){
  const audits = state.audits;
  const allFindings = audits.flatMap(a=>a.findings.map(f=>({...f, auditTitle:a.title, auditId:a.id})));
  const openFindings = allFindings.filter(f=>f.status!=="Closed");
  const overdue = openFindings.filter(f=>f.dueDate && daysUntil(f.dueDate)<0);
  const critical = openFindings.filter(f=>f.severity==="Critical"||f.severity==="Major");
  const scored = audits.map(scoreOf).filter(s=>s!==null);
  const avgScore = scored.length ? Math.round(scored.reduce((a,b)=>a+b,0)/scored.length) : null;

  return `
    <div class="stats">
      ${statCard("Total Audits", audits.length)}
      ${statCard("Open Findings", openFindings.length)}
      ${statCard("Overdue CAPAs", overdue.length)}
      ${statCard("Avg. Compliance", avgScore!==null?avgScore+"%":"—")}
    </div>
    <div class="card p4" style="margin-bottom:16px;">
      <h3 class="serif" style="font-size:16px;margin:0 0 10px;">Priority Findings</h3>
      ${critical.filter(f=>f.status!=="Closed").length===0 ? `<p class="muted-italic">No major or critical findings open right now.</p>` :
        critical.filter(f=>f.status!=="Closed").slice(0,6).map(f=>`
          <button data-jump-audit="${f.auditId}" class="audit-row" style="background:#faf8f2;border:1px solid #e8e1cd;border-radius:8px;margin-bottom:6px;">
            <div style="min-width:0;">
              <div style="font-size:14px;">${esc(f.desc)}</div>
              <div class="audit-sub">${esc(f.auditTitle)} · ${esc(f.clause)}</div>
            </div>
            <div class="flex-wrap">
              ${f.dueDate && daysUntil(f.dueDate)<0 ? `<span class="tag tag-rust">overdue</span>`:''}
              <span class="tag tag-${sevTone[f.severity]}">${f.severity}</span>
            </div>
          </button>`).join('')}
    </div>
    <div class="card p4">
      <h3 class="serif" style="font-size:16px;margin:0 0 10px;">Audit Overview</h3>
      ${audits.map(a=>{
        const s = scoreOf(a);
        return `<button data-jump-audit="${a.id}" class="audit-row" style="border-radius:8px;">
          <div style="display:flex;align-items:center;gap:8px;min-width:0;">
            <span style="color:#c9c0a8;">›</span><span style="font-size:14px;">${esc(a.title)}</span>
          </div>
          <div class="flex-wrap">
            ${s!==null?`<span style="font-size:12px;color:var(--muted);">${s}%</span>`:''}
            <span class="tag tag-${statusTone[a.status]}">${a.status}</span>
          </div>
        </button>`;
      }).join('')}
    </div>
  `;
}
function statCard(label,value){
  return `<div class="card p4"><div class="stat-label">${label}</div><div class="stat-value">${value}</div></div>`;
}

function renderAudits(){
  const audits = state.audits;
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 class="serif" style="font-size:18px;margin:0;">Audit Register</h2>
      <button class="btn btn-primary" data-action="toggle-new-audit">+ New Audit</button>
    </div>
    ${showNewAudit ? `
      <div class="card p4 grid3" style="margin-bottom:16px;">
        <label class="field">Title<input id="na-title" /></label>
        <label class="field">Standard<select id="na-standard">${STANDARDS.map(s=>`<option>${s}</option>`).join('')}</select></label>
        <label class="field">Area<input id="na-area" /></label>
        <div class="muted-italic" style="grid-column:1/-1;font-size:12px;">Checklist sections auto-populate from a starter template for the selected standard — you can edit or add to them after creating the audit.</div>
        <div style="grid-column:1/-1;display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn btn-ghost" data-action="cancel-new-audit">Cancel</button>
          <button class="btn btn-primary" data-action="create-audit">Create</button>
        </div>
      </div>` : ``}
    <div>
      ${audits.map(a => renderAuditRow(a)).join('') || `<p class="muted-italic">No audits yet.</p>`}
    </div>
  `;
}

function renderAuditRow(a){
  const open = openAuditId === a.id;
  const openFindings = a.findings.filter(f=>f.status!=="Closed").length;
  return `
    <div class="card" style="margin-bottom:10px;overflow:hidden;">
      <button class="audit-row" data-toggle-audit="${a.id}">
        <div style="display:flex;align-items:center;gap:10px;min-width:0;">
          <span style="color:#a39a86;">${open?'▾':'›'}</span>
          <div style="min-width:0;">
            <div class="audit-title">${esc(a.title)}</div>
            <div class="audit-sub">${esc(a.standard)} · ${esc(a.area)||'—'} · ${a.date}</div>
          </div>
        </div>
        <div class="flex-wrap">
          ${openFindings>0?`<span class="tag tag-rust">${openFindings} open</span>`:''}
          <span class="tag tag-${statusTone[a.status]}">${a.status}</span>
        </div>
      </button>
      ${open ? `<div style="border-top:1px solid var(--line2);padding:16px;">${renderAuditDetail(a)}</div>` : ''}
    </div>
  `;
}

function renderAuditDetail(a){
  const items = a.sections.flatMap(s=>s.items).filter(i=>i.result==="Pass"||i.result==="Fail");
  const score = items.length ? Math.round((items.filter(i=>i.result==="Pass").length/items.length)*100) : null;
  return `
    <div class="card p4" style="margin-bottom:12px;">
      <div class="grid2">
        <label class="field">Audit Title<input data-audit-field="${a.id}:title" value="${esc(a.title)}" /></label>
        <label class="field">Standard<select data-audit-field="${a.id}:standard">${STANDARDS.map(s=>`<option ${s===a.standard?'selected':''}>${s}</option>`).join('')}</select></label>
        <label class="field">Area<input data-audit-field="${a.id}:area" value="${esc(a.area)}" /></label>
        <label class="field">Auditor<input data-audit-field="${a.id}:auditor" value="${esc(a.auditor)}" placeholder="Name" /></label>
        <label class="field">Date<input type="date" data-audit-field="${a.id}:date" value="${a.date}" /></label>
        <label class="field">Status<select data-audit-field="${a.id}:status">${["Planned","In Progress","Closed"].map(s=>`<option ${s===a.status?'selected':''}>${s}</option>`).join('')}</select></label>
      </div>
      <div class="top-border" style="display:flex;align-items:center;justify-content:space-between;">
        ${score!==null ? `<div style="display:flex;align-items:center;gap:8px;"><span class="serif" style="font-size:18px;color:var(--navy);">${score}%</span><span style="font-size:12px;color:var(--muted);">compliance score</span></div>` : `<span class="muted-italic">Score appears once checklist items are marked</span>`}
        <button class="btn btn-danger" data-action="delete-audit" data-audit="${a.id}">Delete Audit</button>
      </div>
    </div>

    <div class="card p4" style="margin-bottom:12px;">
      <h3 class="serif" style="font-size:16px;margin:0 0 10px;">Checklist</h3>
      ${a.sections.map(sec => `
        <div class="section-box">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <strong style="font-size:14px;">${esc(sec.name)}</strong>
            <button class="x-btn" data-action="remove-section" data-audit="${a.id}" data-section="${sec.id}">✕</button>
          </div>
          ${sec.items.map(it => `
            <div class="item-row">
              <div class="result-toggle">
                <button data-toggle-result="${a.id}:${sec.id}:${it.id}:Pass" class="${it.result==='Pass'?'active':''}" style="color:#3f6b2e;">✓</button>
                <button data-toggle-result="${a.id}:${sec.id}:${it.id}:Fail" class="${it.result==='Fail'?'active':''}" style="color:#9b3f28;">✕</button>
                <button data-toggle-result="${a.id}:${sec.id}:${it.id}:NA" class="${it.result==='NA'?'active':''}" style="color:#a39a86;">–</button>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:14px;">${esc(it.text)}</div>
                ${it.result==='Fail' ? `<input placeholder="Note (optional)…" data-item-note="${a.id}:${sec.id}:${it.id}" value="${esc(it.note)}" style="border:none;border-bottom:1px solid var(--line2);border-radius:0;background:none;font-size:12px;padding:2px 0;" />` : ''}
              </div>
              <button class="x-btn" data-action="remove-item" data-audit="${a.id}" data-section="${sec.id}" data-item="${it.id}">🗑</button>
            </div>
          `).join('')}
          <div style="display:flex;gap:6px;margin-top:8px;">
            <input placeholder="Add checklist item…" data-new-item="${a.id}:${sec.id}" style="flex:1;font-size:13px;padding:6px 8px;" />
            <button class="btn btn-ghost" data-action="add-item" data-audit="${a.id}" data-section="${sec.id}">+</button>
          </div>
        </div>
      `).join('')}
      <div style="display:flex;gap:8px;">
        <input placeholder="New section name (e.g. Allergen Control)" id="new-section-${a.id}" style="flex:1;" />
        <button class="btn btn-ghost" data-action="add-section" data-audit="${a.id}">+ Add Section</button>
      </div>
    </div>

    <div class="card p4">
      <h3 class="serif" style="font-size:16px;margin:0 0 10px;">⚠ Findings & CAPA</h3>
      ${a.findings.map(f => `
        <div class="finding-box">
          <div style="display:flex;justify-content:space-between;gap:8px;">
            <div style="font-size:14px;flex:1;">${esc(f.desc)}</div>
            <button class="x-btn" data-action="remove-finding" data-audit="${a.id}" data-finding="${f.id}">✕</button>
          </div>
          <div class="flex-wrap" style="font-size:12px;color:var(--muted);margin:6px 0;">
            <span class="tag tag-${sevTone[f.severity]}">${f.severity}</span>
            <span>${esc(f.clause)}</span>
            ${f.owner?`<span>👤 ${esc(f.owner)}</span>`:''}
            ${f.dueDate?`<span style="${daysUntil(f.dueDate)<0 && f.status!=='Closed' ? 'color:var(--rust);font-weight:600;':''}">📅 ${f.dueDate}${daysUntil(f.dueDate)<0 && f.status!=='Closed'?' (overdue)':''}</span>`:''}
          </div>
          ${f.actionText?`<div class="muted-italic" style="font-size:12px;">CAPA: ${esc(f.actionText)}</div>`:''}
          <div class="flex-wrap" style="margin-top:8px;">
            ${["Open","In Progress","Closed"].map(s=>`<button class="status-pill ${f.status===s?'active':''}" data-set-finding-status="${a.id}:${f.id}:${s}">${s}</button>`).join('')}
          </div>
        </div>
      `).join('')}
      <div class="grid2 top-border">
        <label class="field">Clause / Section<select id="nf-clause-${a.id}">${a.sections.map(s=>`<option>${esc(s.name)}</option>`).join('')}</select></label>
        <label class="field">Severity<select id="nf-severity-${a.id}">${SEVERITIES.map(s=>`<option>${s}</option>`).join('')}</select></label>
        <label class="field">Owner<input id="nf-owner-${a.id}" /></label>
        <label class="field">CAPA Due Date<input type="date" id="nf-due-${a.id}" /></label>
        <label class="field" style="grid-column:1/-1;">Finding Description<input id="nf-desc-${a.id}" placeholder="What was observed…" /></label>
        <label class="field" style="grid-column:1/-1;">Corrective Action<input id="nf-action-${a.id}" placeholder="Planned CAPA…" /></label>
        <button class="btn btn-primary" style="grid-column:1/-1;justify-content:center;" data-action="add-finding" data-audit="${a.id}">+ Log Finding</button>
      </div>
    </div>
  `;
}

function renderCapa(){
  const all = state.audits.flatMap(a=>a.findings.map(f=>({...f, auditTitle:a.title, auditId:a.id})));
  const filtered = all.filter(f => capaFilter==="All" || f.status===capaFilter || (capaFilter==="Overdue" && f.dueDate && daysUntil(f.dueDate)<0 && f.status!=="Closed"));
  const sorted = [...filtered].sort((a,b)=>(a.dueDate||"9999").localeCompare(b.dueDate||"9999"));
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
      <h2 class="serif" style="font-size:18px;margin:0;">CAPA Tracker</h2>
      <div class="flex-wrap">
        ${["All","Open","In Progress","Closed","Overdue"].map(f=>`<button class="status-pill ${capaFilter===f?'active':''}" data-capa-filter="${f}">${f}</button>`).join('')}
      </div>
    </div>
    <div>
      ${sorted.length===0 ? `<p class="muted-italic">No CAPAs match this filter.</p>` : sorted.map(f=>{
        const overdue = f.dueDate && daysUntil(f.dueDate)<0 && f.status!=="Closed";
        return `<button data-jump-audit="${f.auditId}" class="card p4" style="display:flex;width:100%;text-align:left;gap:12px;flex-wrap:wrap;margin-bottom:8px;cursor:pointer;${overdue?'border-color:#e8c3b5;':''}">
          <div style="flex:1;min-width:200px;">
            <div style="font-size:14px;">${esc(f.desc)}</div>
            <div class="audit-sub">${esc(f.auditTitle)} · ${esc(f.clause)}</div>
          </div>
          <div class="flex-wrap" style="font-size:12px;color:var(--muted);">
            ${f.owner?`<span>👤 ${esc(f.owner)}</span>`:''}
            ${f.dueDate?`<span style="${overdue?'color:var(--rust);font-weight:600;':''}">📅 ${f.dueDate}</span>`:''}
            <span class="tag tag-${sevTone[f.severity]}">${f.severity}</span>
            <span class="tag tag-${statusTone[f.status]}">${f.status}</span>
          </div>
        </button>`;
      }).join('')}
    </div>
  `;
}

/* ---------- event handling ---------- */
function attachHandlers(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{ tab = el.dataset.nav; if(tab!=="audits") openAuditId=null; render(); });
  document.querySelectorAll('[data-jump-audit]').forEach(el=>el.onclick=()=>{ jumpTo = el.dataset.jumpAudit; openAuditId = jumpTo; tab="audits"; render(); });
  const toggleNew = document.querySelector('[data-action="toggle-new-audit"]'); if(toggleNew) toggleNew.onclick=()=>{ showNewAudit=!showNewAudit; render(); };
  const cancelNew = document.querySelector('[data-action="cancel-new-audit"]'); if(cancelNew) cancelNew.onclick=()=>{ showNewAudit=false; render(); };
  const createAudit = document.querySelector('[data-action="create-audit"]');
  if(createAudit) createAudit.onclick=()=>{
    const title = document.getElementById('na-title').value.trim();
    if(!title) return;
    const standard = document.getElementById('na-standard').value;
    const area = document.getElementById('na-area').value;
    const tmpl = TEMPLATES[standard];
    const sections = tmpl ? tmpl.map(s=>({name:s.name, items:[...s.items]})) : [{name:"General", items:[]}];
    const a = seedAudit(title, standard, area, sections);
    state.audits.unshift(a);
    openAuditId = a.id; showNewAudit=false; persist(); render();
  };

  document.querySelectorAll('[data-toggle-audit]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.toggleAudit; openAuditId = openAuditId===id ? null : id; render();
  });

  document.querySelectorAll('[data-audit-field]').forEach(el=>{
    el.onchange = () => {
      const [id, field] = el.dataset.auditField.split(':');
      const a = state.audits.find(x=>x.id===id);
      a[field] = el.value; persist(); render();
    };
  });

  document.querySelectorAll('[data-action="delete-audit"]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.audit; state.audits = state.audits.filter(a=>a.id!==id); openAuditId=null; persist(); render();
  });

  document.querySelectorAll('[data-toggle-result]').forEach(el=>el.onclick=()=>{
    const [auditId, secId, itemId, val] = el.dataset.toggleResult.split(':');
    const a = state.audits.find(x=>x.id===auditId);
    const sec = a.sections.find(s=>s.id===secId);
    const item = sec.items.find(i=>i.id===itemId);
    item.result = item.result===val ? null : val;
    persist(); render();
  });

  document.querySelectorAll('[data-item-note]').forEach(el=>el.onchange=()=>{
    const [auditId, secId, itemId] = el.dataset.itemNote.split(':');
    const a = state.audits.find(x=>x.id===auditId);
    const sec = a.sections.find(s=>s.id===secId);
    const item = sec.items.find(i=>i.id===itemId);
    item.note = el.value; persist();
  });

  document.querySelectorAll('[data-action="remove-item"]').forEach(el=>el.onclick=()=>{
    const a = state.audits.find(x=>x.id===el.dataset.audit);
    const sec = a.sections.find(s=>s.id===el.dataset.section);
    sec.items = sec.items.filter(i=>i.id!==el.dataset.item);
    persist(); render();
  });

  document.querySelectorAll('[data-action="add-item"]').forEach(el=>el.onclick=()=>{
    const input = document.querySelector(`[data-new-item="${el.dataset.audit}:${el.dataset.section}"]`);
    const text = input.value.trim(); if(!text) return;
    const a = state.audits.find(x=>x.id===el.dataset.audit);
    const sec = a.sections.find(s=>s.id===el.dataset.section);
    sec.items.push({id:uid(), text, result:null, note:""});
    persist(); render();
  });

  document.querySelectorAll('[data-action="remove-section"]').forEach(el=>el.onclick=()=>{
    const a = state.audits.find(x=>x.id===el.dataset.audit);
    a.sections = a.sections.filter(s=>s.id!==el.dataset.section);
    persist(); render();
  });

  document.querySelectorAll('[data-action="add-section"]').forEach(el=>el.onclick=()=>{
    const input = document.getElementById(`new-section-${el.dataset.audit}`);
    const name = input.value.trim(); if(!name) return;
    const a = state.audits.find(x=>x.id===el.dataset.audit);
    a.sections.push({id:uid(), name, items:[]});
    persist(); render();
  });

  document.querySelectorAll('[data-action="remove-finding"]').forEach(el=>el.onclick=()=>{
    const a = state.audits.find(x=>x.id===el.dataset.audit);
    a.findings = a.findings.filter(f=>f.id!==el.dataset.finding);
    persist(); render();
  });

  document.querySelectorAll('[data-set-finding-status]').forEach(el=>el.onclick=()=>{
    const [auditId, findingId, status] = el.dataset.setFindingStatus.split(':');
    const a = state.audits.find(x=>x.id===auditId);
    const f = a.findings.find(x=>x.id===findingId);
    f.status = status; persist(); render();
  });

  document.querySelectorAll('[data-action="add-finding"]').forEach(el=>el.onclick=()=>{
    const auditId = el.dataset.audit;
    const desc = document.getElementById(`nf-desc-${auditId}`).value.trim();
    if(!desc) return;
    const a = state.audits.find(x=>x.id===auditId);
    a.findings.push({
      id: uid(),
      clause: document.getElementById(`nf-clause-${auditId}`).value,
      desc,
      severity: document.getElementById(`nf-severity-${auditId}`).value,
      owner: document.getElementById(`nf-owner-${auditId}`).value,
      dueDate: document.getElementById(`nf-due-${auditId}`).value,
      actionText: document.getElementById(`nf-action-${auditId}`).value,
      status: "Open"
    });
    persist(); render();
  });

  document.querySelectorAll('[data-capa-filter]').forEach(el=>el.onclick=()=>{
    capaFilter = el.dataset.capaFilter; render();
  });
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
